        ".specify/specs/001-oap/contracts/datasets.md",
        ".specify/specs/001-oap/spec.md"
      ]
    },
    {
      "id": "telemetry/task-board",
      "label": "Telemetry and task board",
      "entryDocs": [
        "docs/subservices/oap/AGENT_TELEMETRY.md",
        "docs/subservices/oap/README.md"
      ]
    },
    {
      "id": "workflow/bpmn",
      "label": "Workflow and BPMN",
      "entryDocs": [
        "docs/bpmn/analyst-agent-flow.bpmn",
        "docs/subservices/oap/agents/analyst-agent/OPERATING_PLAN.md"
      ]
    },
    {
      "id": "architecture/c4",
      "label": "Architecture and C4",
      "entryDocs": [
        ".specify/specs/001-oap/spec.md",
        "docs/oap.c4"
