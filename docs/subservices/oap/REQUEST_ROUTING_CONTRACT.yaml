        "docs/subservices/oap/README.md",
        "docs/subservices/oap/DESIGN_RULES.md"
      ],
      "verify": ["build_affected_ui", "verify_content_traceability"]
    },
    {
      "id": "ui_drawer_contract",
      "origin": "user_chat",
      "domain": "frontend-contract",
      "capabilities": ["rules", "contracts", "session_state"],
      "readFirst": [
        ".specify/specs/001-oap/spec.md",
        ".specify/specs/001-oap/contracts/frontend-api.md",
