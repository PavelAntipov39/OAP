{
  "version": "1.0.0",
  "updatedAt": "2026-03-08",
  "status": "stable",
  "description": "Canonical OAP startup routing contract. Domains are embedded here; manual decision table is removed. Step-level capabilities in operating plans are baseline minimum; runtime capability selection is capability-first and dynamic.",
  "origins": [
    "user_chat",
    "agent_generated",
    "automation"
  ],
  "capabilities": [
    "rules",
    "tools",
    "skills",
    "mcp",
    "session_state",
    "long_term_memory",
    "contracts",
    "orchestration",
    "human_approval"
  ],
  "fallback": {
    "unknownDomain": "capability_first",
    "conflictingDomain": "capability_first_with_escalation",
    "missingCapabilities": "authority_then_repo_ops",
    "trustOrder": [
      ".specify/specs/001-oap/spec.md",
      ".specify/specs/001-oap/contracts/*",
      ".specify/specs/001-oap/decisions/*",
      "docs/*",
      "AGENTS.md",
      "code_runtime_artifacts",
      "tool_outputs",
      "external_docs",
      "external_global_files"
    ]
  },
  "domains": [
    {
      "id": "agent-card/content",
      "label": "Agent card content",
      "entryDocs": [
        "docs/subservices/oap/README.md",
        "docs/subservices/oap/DESIGN_RULES.md"
      ]
    },
    {
      "id": "frontend-contract",
      "label": "Frontend contract",
      "entryDocs": [
        ".specify/specs/001-oap/contracts/frontend-api.md",
