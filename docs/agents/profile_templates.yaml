      "id": "contract-audit",
      "name": "Contract Audit Specialist",
      "specializationScope": "Validate spec/contracts/task payloads/generated manifests and report contract drift before apply/verify.",
      "defaultSkills": [
        "doc"
      ],
      "defaultTools": [
        "Contract validator",
        "QMD retrieval"
      ],
      "defaultMcp": [
        "qmd",
        "context7"
      ],
      "defaultRules": [
        "Source of truth: спецификация проекта",
        "Universal workflow backbone"
      ],
      "capabilityOptimization": {
        "enabled": true,
        "refreshMode": "on_run",
        "sourcePolicy": "official_first",
        "trialMode": "shadow",
        "promotionMode": "human_approve",
        "minShadowSampleSize": 3,
        "staleAfterHours": 168
      },
      "workflowBackbone": {
        "version": "universal_backbone_v1",
        "commonCoreSteps": [
          "step_0_intake",
          "step_1_start",
          "step_2_preflight",
          "step_3_orchestration",
          "step_4_context_sync",
          "step_5_role_window",
          "step_6_role_exit_decision",
          "step_7_apply_or_publish",
          "step_7_contract_gate",
          "step_8_verify",
          "step_8_error_channel",
          "step_9_finalize",
          "step_9_publish_snapshots"
        ],
        "roleWindow": {
          "entryStep": "step_5_role_window",
          "exitStep": "step_6_role_exit_decision",
          "purpose": "Проверить контрактный слой и вернуть bounded report о нарушениях и safe apply envelope.",
          "internalSteps": [
            "role_collect_contract_sources",
            "role_compare_contract_shapes",
            "role_prepare_result_package"
          ]
        },
        "stepExecutionPolicy": {
          "skippedStepsAllowed": true,
          "skippedStepStatus": "skipped"
        },
        "supportsDynamicInstances": true
      },
      "capabilityContract": {
        "mission": "Detect contract mismatches early and return a precise safe-to-apply decision.",
        "entryCriteria": [
          "Task changes spec, contracts, payload shape, routing, or generated manifest semantics.",
          "At least one source-of-truth contract must stay consistent after the change."
        ],
        "doneCondition": "All contract gaps are classified and a clear apply/verify decision is returned.",
        "outputSchema": "contract_audit_report.v1"
      }
    },
